{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card bg-white border-0 shadow-sm" style="border-radius: 16px;">
                <div class="card-header border-0 text-center py-4" style="background: linear-gradient(135deg, var(--accent-primary), #1B5E20); border-radius: 16px 16px 0 0;">
                    <h3 class="mb-0 text-white fw-bold"><i class="fa-solid fa-user-plus"></i> Create Account</h3>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold" style="color: var(--text-color);">Desired Username</label>
                            <input type="text" name="username" class="form-control bg-light" placeholder="e.g. rohan99" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold" style="color: var(--text-color);">Email Address</label>
                            <input type="email" name="email" class="form-control bg-light" placeholder="user@gmail.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold" style="color: var(--text-color);">Secure Password</label>
                            <input type="password" name="password" class="form-control bg-light" placeholder="Min 6 characters" required>
                        </div>
                        <button type="submit" class="btn btn-custom w-100 py-3 shadow-sm rounded-pill mt-3">Register Now <i class="fa-solid fa-check ms-1"></i></button>
                    </form>
                    
                    <div class="text-center mt-4 border-top pt-4">
                        <p class="text-muted mb-0">Already have an account?</p>
                        <a href="{{ url_for('login') }}" class="fw-bold fs-5 text-decoration-none" style="color: var(--accent-primary);">Login here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
